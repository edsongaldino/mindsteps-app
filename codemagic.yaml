workflows:
  mobile-release:
    name: MindSteps iOS e Android

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true

    environment:
      flutter: stable
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: br.com.mindsteps.app

    scripts:
      - flutter clean
      - flutter pub get
      - flutter build ipa --release
      - flutter build appbundle --release

    artifacts:
      - build/ios/ipa/*.ipa
      - build/app/outputs/bundle/release/*.aab
      